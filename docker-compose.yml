# Local Postgres for development. Matches DATABASE_URL in .env.example.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bishop
      POSTGRES_PASSWORD: bishop
      POSTGRES_DB: bishopai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
